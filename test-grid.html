<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    // Stub Calculations globally
    const Calculations = {
      getStockColour(p, m) {
        if (p < 0) return 'red';
        if (p < m) return 'light-pink';
        if (p <= m * 1.05) return 'green';
        return 'orange';
      },
      calcSuggestedOrderQty(row, weekKeys, mechLookup) {
        if (!row.needsOrder) return 0;
        const leadDays  = mechLookup.lookup[row.newCode]?.leadTimeDays || 0;
        const leadWeeks = Math.ceil(leadDays / 7);
        const demandDuringLead = row.weeks.slice(0, leadWeeks).reduce((sum, w) => sum + w.demand, 0);
        return Math.max(0, row.minLevel - row.minProjected + demandDuringLead);
      }
    };
  </script>
  <script src="components/PlanningGrid.js"></script>
  <script src="components/SuggestedOrders.js"></script>
  <script src="components/WarningsPanel.js"></script>
  <script>
    const weekKeys = Array.from({length:12}, (_,i) => {
      const d = new Date('2026-03-23');
      d.setDate(d.getDate() + i*7);
      return d.toISOString().slice(0,10);
    });
    const rows = [
      { newCode:'MECH-01', currentStock:30, minLevel:20, price:12, needsOrder:false, minProjected:22,
        weeks: weekKeys.map((wk,i) => ({ weekKey:wk, demand:2, incoming:i===1?10:0, projected:30-i*2+(i>=1?10:0) })) },
      { newCode:'MECH-02', currentStock:5,  minLevel:20, price:8,  needsOrder:true,  minProjected:-3,
        weeks: weekKeys.map((wk,i) => ({ weekKey:wk, demand:3, incoming:0, projected:5-i*3 })) },
    ];
    Vue.createApp({
      components: { PlanningGrid, SuggestedOrders, WarningsPanel },
      data: () => ({
        rows, weekKeys, showAtRisk: false,
        mechLookup: { lookup: { 'MECH-01': { leadTimeDays:14 }, 'MECH-02': { leadTimeDays:7 } }, bySageCode:{}, bySeminarCode:{} },
        warnings: ['PO Listing: "OLD-CODE-X"'],
      }),
      template: `
        <WarningsPanel :warnings="warnings" />
        <PlanningGrid :rows="rows" :week-keys="weekKeys" :show-at-risk="showAtRisk" />
        <SuggestedOrders :rows="rows" :week-keys="weekKeys" :mech-lookup="mechLookup" />
      `,
    }).mount('#app');
  </script>
</body>
</html>
